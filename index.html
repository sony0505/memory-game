<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代生活小學堂 - 配對遊戲 (獨立圖片版)</title>
    <!-- 連結外部的 CSS 樣式檔 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 右上角設定介面 -->
    <div class="settings-container">
        <label for="mode-select">計時模式：</label>
        <select id="mode-select" onchange="initGame()">
            <option value="up">正計時</option>
            <option value="down">倒計時 (40秒)</option>
        </select>
    </div>

    <h1>🧠 現代生活小學堂</h1>
    <p>阿公阿嬤，請點擊卡片，把圖案和文字找出來配對喔！</p>
    
    <div id="timer-display">時間：0 秒</div>
    <div id="message-box">歡迎來挑戰！</div>
    
    <div class="game-board" id="game-board">
        </div>

    <button onclick="initGame()">重新開始</button>

    <!-- 連結外部的 JavaScript 邏輯檔 -->
    <script src="script.js" defer></script>
</body>
</html>
