<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代生活小學堂 - 配對遊戲 (獨立圖片版)</title>
    <!-- 引入 Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 連結外部的 CSS 樣式檔 -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- 頂部導覽列 (使用 Offcanvas 漢堡選單) -->
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold text-warning">🧠 現代生活小學堂</span>
            
            <!-- 漢堡選單按鈕 (三條線) -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- 從右側滑出的選單內容 -->
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header border-bottom border-secondary">
                    <h5 class="offcanvas-title text-warning" id="offcanvasNavbarLabel">遊戲設定</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <h6 class="text-secondary mb-3">遊戲設定</h6>
                    <div class="mb-3">
                        <label for="question-count" class="form-label text-light">題目數量</label>
                        <select class="form-select bg-dark text-light border-secondary" id="question-count" onchange="initGame()">
                            <option value="2">2 題 (2x2 共 4 格)</option>
                            <option value="4" selected>4 題 (2x4 共 8 格)</option>
                            <option value="6">6 題 (3x4 共 12 格)</option>
                            <option value="8">8 題 (4x4 共 16 格)</option>
                            <option value="12">12 題 (6x4 共 24 格)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="mode-select" class="form-label text-light">選擇模式</label>
                        <select class="form-select bg-dark text-light border-secondary" id="mode-select" onchange="toggleCountdownInput(); initGame();">
                            <option value="up">正計時 (挑戰最快速度)</option>
                            <option value="down">倒計時 (自訂限時挑戰)</option>
                        </select>
                    </div>
                    <div id="countdown-setting-wrap" class="mb-3" style="display: none;">
                        <label for="countdown-input" class="form-label text-light">倒計時秒數</label>
                        <input type="number" class="form-control bg-dark text-light border-secondary" id="countdown-input" value="40" min="5" max="300" onchange="initGame()">
                    </div>
                    
                    <h6 class="text-secondary mb-3 mt-4 pt-3 border-top border-secondary">音效與音樂</h6>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="bgm-toggle" checked onchange="toggleBGM()">
                            <label class="form-check-label text-light" for="bgm-toggle">背景音樂 (BGM)</label>
                        </div>
                    </div>
                    <div class="mt-2">
                        <small class="text-secondary">之後可以在這裡加入音量調整功能...</small>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <p class="lead fw-bold text-secondary mb-3">阿公阿嬤，請點擊卡片，把圖案和文字找出來配對喔！</p>
        
        <div id="timer-display" class="badge rounded-pill bg-warning text-dark fs-4 mb-3 px-4 py-2 border border-secondary shadow-sm">時間：0 秒</div>
        <div id="message-box" class="alert alert-info shadow-sm py-3 mb-4 fw-bold fs-3">歡迎來挑戰！</div>
        
        <div class="game-board mx-auto" id="game-board"></div>

        <button class="btn btn-lg btn-success shadow mt-4 px-5 py-3 fw-bold fs-2" onclick="initGame()">🔄 重新開始</button>
    </div>

    <!-- 引入 Bootstrap 5.3 JS Bundle (含 Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 連結外部的 JavaScript 邏輯檔 -->
    <script src="script.js" defer></script>
</body>
</html>
